name: Publish NuGet Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FinnHubSharp.sln

      - name: Build
        run: dotnet build FinnHubSharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/FinnHubSharp.Tests/FinnHubSharp.Tests.csproj --configuration Release --no-build

      - name: Pack
        run: dotnet pack src/FinnHubSharp/FinnHubSharp.csproj --configuration Release --no-build --output artifacts

      - name: Publish to nuget.org
        run: dotnet nuget push artifacts/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key "$NUGET_API_KEY" --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
