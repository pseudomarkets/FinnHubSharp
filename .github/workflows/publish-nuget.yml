name: Publish NuGet Package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FinnHubSharp.sln

      - name: Build
        run: dotnet build FinnHubSharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/FinnHubSharp.Tests/FinnHubSharp.Tests.csproj --configuration Release --no-build

      - name: Read package version
        id: package-version
        run: |
          version=$(dotnet msbuild src/FinnHubSharp/FinnHubSharp.csproj -getProperty:Version)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack src/FinnHubSharp/FinnHubSharp.csproj --configuration Release --no-build --output artifacts

      - name: Publish to nuget.org
        run: dotnet nuget push artifacts/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key "$NUGET_API_KEY" --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub release
        run: |
          gh release create "${{ steps.package-version.outputs.tag }}" artifacts/*.nupkg \
            --repo "$GITHUB_REPOSITORY" \
            --title "FinnHubSharp ${{ steps.package-version.outputs.tag }}" \
            --notes "NuGet package for FinnHubSharp ${{ steps.package-version.outputs.version }}."
        env:
          GH_TOKEN: ${{ github.token }}
