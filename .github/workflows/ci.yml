name: CI

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FinnHubSharp.sln

      - name: Build
        run: dotnet build FinnHubSharp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/FinnHubSharp.Tests/FinnHubSharp.Tests.csproj --configuration Release --no-build
